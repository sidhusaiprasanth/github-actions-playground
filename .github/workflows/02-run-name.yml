name: Run name Demo
run-name: "Triggered by ${{github.actor}} on ${{github.ref_name}} via ${{github.event_name}}"

on:
  push:
    branches: 
      - main
      - 'release/**'
  pull_request: 
    types:
      - opened
      - synchronize
      - reopened
      - closed
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00 AM UTC
  workflow_dispatch:
    inputs:
      environment:
        description: dsfgsdf
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      debug:
        description: asfdafs
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow}}-${{github.ref_name}}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  demo-job:
    runs-on: ubuntu-latest
    name: Demo JOB
    steps:
      - name: Shows who ran the job
        run: echo "This is ran by ${{github.actor}}"

      - name: Write job summary
        run: |
          echo "## Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Event** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY

      - name: Print all GitHub contexts
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
          JOB_CONTEXT: ${{ toJson(job) }}
          STEPS_CONTEXT: ${{ toJson(steps) }}
          RUNNER_CONTEXT: ${{ toJson(runner) }}
          STRATEGY_CONTEXT: ${{ toJson(strategy) }}
          MATRIX_CONTEXT: ${{ toJson(matrix) }}
        run: |
          echo "=== GitHub Context ==="
          echo "$GITHUB_CONTEXT"
          echo "=== Job Context ==="
          echo "$JOB_CONTEXT"
          echo "=== Steps Context ==="
          echo "$STEPS_CONTEXT"
          echo "=== Runner Context ==="
          echo "$RUNNER_CONTEXT"
          echo "=== Strategy Context ==="
          echo "$STRATEGY_CONTEXT"
          echo "=== Matrix Context ==="
          echo "$MATRIX_CONTEXT"

      